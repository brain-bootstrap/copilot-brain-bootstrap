---
name: Bug Report
description: Report a bug in Copilot Brain Bootstrap
labels: ['bug', 'needs-triage']
---

name: Bug Report
description: Something isn't working as expected
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out all fields.

  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit hash or release tag
      placeholder: e.g., abc1234 or v1.2.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. Run install.sh in an empty repo
        2. Open VS Code
        3. Type /health in Copilot chat
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste logs if available.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: e.g., 1.92.0
    validations:
      required: false
